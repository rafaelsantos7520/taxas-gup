<!DOCTYPE html>
<html lang="portuguese-brazil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregas Rápidas Guarapari - Calcule seu Frete!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-fontawesome-kit.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        body {
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            color: #2193b0;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .form-label {
            font-weight: 600;
            color: #2193b0;
        }
        .form-select {
            border: 2px solid #6dd5ed;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(109, 213, 237, 0.25);
            border-color: #2193b0;
        }
        #resultado {
            background: #2193b0;
            color: white;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.2em;
            text-align: center;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .negociacao-info {
            background-color: #e9f7ef;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            border-left: 5px solid #27ae60;
            font-size: 0.9em;
        }
        .icon-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .icon-container i {
            font-size: 4em;
            color: #2193b0;
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translate(0,  0px); }
            50%  { transform: translate(0, 15px); }
            100%   { transform: translate(0, -0px); }   
        }
    </style>
</head>
<body>
    <div class="container animate__animated animate__zoomIn">
        <div class="icon-container">
            <i class="fas fa-motorcycle floating"></i>
        </div>
        <h1 class="animate__animated animate__bounce">Entregas Rápidas Guarapari</h1>
        <div class="mb-4">
            <label for="origem" class="form-label">
                <i class="fas fa-map-marker-alt"></i> Origem:
            </label>
            <select id="origem" class="form-select animate__animated animate__fadeInLeft">
                <option value="">Escolha a origem</option>
                <option value="Muquiçaba">Muquiçaba</option>
                <option value="Praia do Morro">Praia do Morro</option>
                <option value="Centro">Centro</option>
            </select>
        </div>

        <div class="mb-4">
            <label for="destino" class="form-label">
                <i class="fas fa-flag-checkered"></i> Destino:
            </label>
            <select id="destino" class="form-select animate__animated animate__fadeInRight">
                <option value="">Escolha o destino</option>
                <option value="Muquiçaba">Muquiçaba</option>
                <option value="Praia do Morro">Praia do Morro</option>
                <option value="Centro">Centro</option>
                <option value="Itapebuçú">Itapebuçú</option>
                <option value="Aeroporto">Aeroporto</option>
                <option value="Santa Rosa">Santa Rosa</option>
                <option value="Jardim Boa Vista">Jardim Boa Vista</option>
                <option value="Jardim Santa Rosa">Jardim Santa Rosa</option>
                <option value="Jabaraí">Jabaraí</option>
                <option value="Portal Clube">Portal Clube</option>
                <option value="Perocão">Perocão</option>
                <option value="Santa Mônica">Santa Mônica</option>
                <option value="Setiba">Setiba</option>
                <option value="Adalberto">Adalberto</option>
                <option value="Lagoa Funda">Lagoa Funda</option>
                <option value="Sol Nascente">Sol Nascente</option>
                <option value="São José">São José</option>
                <option value="São Gabriel">São Gabriel</option>
                <option value="Nossa Senhora da Conceição">Nossa Senhora da Conceição</option>
                <option value="Bela Vista">Bela Vista</option>
                <option value="Nossa Senhora de Fátima">Nossa Senhora de Fátima</option>
                <option value="Rodoviária">Rodoviária</option>
                <option value="Ipiranga">Ipiranga</option>
                <option value="Olaria">Olaria</option>
                <option value="Kubitschek">Kubitschek</option>
                <option value="Coronado">Coronado</option>
                <option value="Concha da Ostra">Concha da Ostra</option>
                <option value="Praia do Riacho">Praia do Riacho</option>
                <option value="Lameirão">Lameirão</option>
                <option value="Nova Guarapari">Nova Guarapari</option>
                <option value="Meaípe">Meaípe</option>
                <option value="Condados">Condados</option>
                <option value="Porto Grande">Porto Grande</option>
                <option value="Mãe-bá">Mãe-bá</option>
                <option value="Taquaras">Taquaras</option>
                <option value="Praia do Sol">Praia do Sol</option>
            </select>
        </div>

        <div id="resultado" class="animate__animated animate__fadeIn pulse"></div>

        <div class="negociacao-info animate__animated animate__fadeInUp">
            <p><i class="fas fa-info-circle"></i> <strong>Atenção:</strong> Os valores apresentados são sugestões. O valor final pode ser negociado diretamente entre o motoboy e o cliente, considerando fatores como distância, horário e condições específicas da entrega.</p>
        </div>
    </div>

    <script>
        const valoresEntrega = {
            "Muquiçaba": {
                "Muquiçaba": 7.00,
                "Centro": 9.00,
                "Praia do Morro": 8.00,
                "Itapebuçú": 8.00,
                "Aeroporto": 10.00,
                "Santa Rosa": 11.00,
                "Jardim Boa Vista": 11.00,
                "Jardim Santa Rosa": 12.00,
                "Jabaraí": 13.00,
                "Portal Clube": 13.00,
                "Perocão": 13.00,
                "Santa Mônica": 15.00,
                "Setiba": 18.00,
                "Adalberto": 8.00,
                "Lagoa Funda": 9.00,
                "Sol Nascente": 9.00,
                "São José": 12.00,
                "São Gabriel": 12.00,
                "Nossa Senhora da Conceição": 12.00,
                "Bela Vista": 12.00,
                "Nossa Senhora de Fátima": 14.00,
                "Rodoviária": 14.00,
                "Ipiranga": 10.00,
                "Olaria": 10.00,
                "Kubitschek": 11.00,
                "Coronado": 11.00,
                "Concha da Ostra": 13.00,
                "Praia do Riacho": 13.00,
                "Lameirão": 16.00,
                "Nova Guarapari": 16.00,
                "Meaípe": 18.00
            },
            "Praia do Morro": {
                "Praia do Morro": 7.00,
                "Muquiçaba": 8.00,
                "Centro": 9.00,
                "Itapebuçú": 8.00,
                "Camurugi": 8.00,
                "Aeroporto": 7.00,
                "Santa Rosa": 8.00,
                "Jardim Boa Vista": 8.00,
                "Jardim Santa Rosa": 9.00,
                "Jabaraí": 12.00,
                "Portal Clube": 13.00,
                "Perocão": 13.00,
                "Santa Mônica": 14.00,
                "Setiba": 17.00,
                "Adalberto": 8.00,
                "Lagoa Funda": 8.00,
                "Sol Nascente": 8.00,
                "São José": 9.00,
                "São Gabriel": 10.00,
                "Nossa Senhora da Conceição": 10.00,
                "Bela Vista": 12.00,
                "Nossa Senhora de Fátima": 14.00,
                "Rodoviária": 17.00,
                "Ipiranga": 11.00,
                "Olaria": 10.00,
                "Kubitschek": 12.00,
                "Coronado": 10.00,
                "Concha da Ostra": 13.00,
                "Praia do Riacho": 13.00,
                "Lameirão": 14.00,
                "Nova Guarapari": 17.00,
                "Meaípe": 19.00
            },
            "Centro": {

                "Muquiçaba": 8.00,

                "Itapebuçú": 9.00,
                "Camurugi": 12.00,
                "Lagoa Funda": 10.00,
                "Aeroporto": 12.00,
                "Santa Rosa": 12.00,
                "Perocão": 15.00,
                "Jabaraí": 14.00,
                "Santa Mônica": 16.00,
                "Setiba": 20.00,

                "Coronado": 9.00,
                "Concha da Ostra": 13.00,
                "Nova Guarapari": 15.00,
                "Meaípe": 17.00,
                "Condados": 17.00,
                "Porto Grande": 20.00,
                "Mãe-bá": 20.00,
                "Taquaras": 25.00,
                "Praia do Sol": 30.00,
                "São Gabriel": 14.00,
                "São José": 13.00,
                "Nossa Senhora da Conceição": 12.00,
                "Nossa Senhora de Fátima": 15.00
            }
        };

        document.getElementById('origem').addEventListener('change', calcularValor);
        document.getElementById('destino').addEventListener('change', calcularValor);

        function calcularValor() {
            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;

            if (origem && destino) {
                const valor = valoresEntrega[origem][destino] || valoresEntrega[destino][origem];
                if (valor) {
                    document.getElementById('resultado').innerHTML = `
                        <i class="fas fa-motorcycle"></i>
                        <span class="animate__animated animate__rubberBand">
                            Valor sugerido para entrega de ${origem} para ${destino}:
                            <br><strong>R$ ${valor.toFixed(2)}</strong>
                        </span>`;
                    document.getElementById('resultado').classList.add('animate__animated', 'animate__pulse');
                } else {
                    document.getElementById('resultado').innerHTML = `
                        <i class="fas fa-exclamation-triangle"></i>
                        <span class="animate__animated animate__shakeX">
                            Desculpe, não há valores sugeridos disponíveis para esta rota.
                        </span>`;
                }
            }
        }
    </script>
</body>
</html>
